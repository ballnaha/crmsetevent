<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90" />
    <line x1="0" y1="180" x2="800" y2="180" />
    <line x1="0" y1="270" x2="800" y2="270" />
    <line x1="0" y1="360" x2="800" y2="360" />
    <line x1="160" y1="0" x2="160" y2="450" />
    <line x1="320" y1="0" x2="320" y2="450" />
    <line x1="480" y1="0" x2="480" y2="450" />
    <line x1="640" y1="0" x2="640" y2="450" />
  </g>

  <!-- QSNCC building silhouette (simplified) -->
  <g opacity="0.12" fill="#ffffff">
    <rect x="280" y="260" width="240" height="120" />
    <rect x="250" y="240" width="300" height="30" />
    <rect x="340" y="200" width="120" height="60" />
    <rect x="380" y="160" width="40" height="50" />
    <!-- columns -->
    <rect x="290" y="260" width="8" height="120" opacity="0.5" />
    <rect x="320" y="260" width="8" height="120" opacity="0.5" />
    <rect x="350" y="260" width="8" height="120" opacity="0.5" />
    <rect x="380" y="260" width="8" height="120" opacity="0.5" />
    <rect x="410" y="260" width="8" height="120" opacity="0.5" />
    <rect x="440" y="260" width="8" height="120" opacity="0.5" />
    <rect x="470" y="260" width="8" height="120" opacity="0.5" />
    <rect x="500" y="260" width="8" height="120" opacity="0.5" />
  </g>

  <!-- Accent line -->
  <rect x="0" y="400" width="800" height="3" fill="url(#accent)" opacity="0.7" />

  <!-- Logo area -->
  <rect x="340" y="148" width="120" height="4" fill="url(#accent)" opacity="0.8" rx="2" />

  <!-- Main text -->
  <text x="400" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="4">QUEEN SIRIKIT NATIONAL</text>
  <text x="400" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="4">CONVENTION CENTER</text>
  <text x="400" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1" opacity="0.9">QSNCC EVENT</text>
  <text x="400" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">Khlong Toei, Bangkok</text>
</svg>
